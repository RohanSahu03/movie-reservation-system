spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 10
                    key-resolver: "#{@userKeyResolver}"

            - id: movie-service
              uri: lb://MOVIE-SERVICE
              predicates:
                - Path=/api/v1/movies/**

            - id: theater-service
              uri: lb://THEATER-SERVICE
              predicates:
                - Path=/api/v1/theaters/**

            - id: screen-service
              uri: lb://THEATER-SERVICE
              predicates:
                - Path=/api/v1/screens/**

            - id: seat-service
              uri: lb://THEATER-SERVICE
              predicates:
                - Path=/api/v1/seats/**

server:
  port: 8080

eureka:
  instance:
    prefer-ip-address: true
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

jwt:
  secret: 6X5bq1Qm9Rk8Vz3Lp2Nt7Hs4YwEaFdGcJjKhLmNpQrStUvWxYz1234567890AbCd

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.web.reactive: DEBUG
    reactor.netty.http.client: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG

