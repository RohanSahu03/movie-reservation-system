spring:
  application:
    name: api-gateway

  spring:
    cloud:
      gateway:
        server:
          webflux:
            discovery:
              locator:
                enabled: true
                lower-case-service-id: true

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: always