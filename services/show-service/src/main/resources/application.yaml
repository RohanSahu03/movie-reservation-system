spring:
  application:
    name: show-service

  datasource:
    url: jdbc:mysql://localhost:3306/show_service_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

server:
  port: 8085

eureka:
  instance:
    prefer-ip-address: true
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: always

logging:
  level:
    com.movie.show_service.client.TheaterClient: DEBUG
    feign.Logger: DEBUG
    org.springframework.web: DEBUG

feign:
  client:
    config:
      default:
        loggerLevel: FULL